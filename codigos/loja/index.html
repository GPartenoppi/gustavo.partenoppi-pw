<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/loja.js"></script>
</head>

<body>
    <header><img src="imagens/carrinho.png" class="carrinho">Lojinha da Camargo</header>
    <table style="width: 100%">
    <tr>
        <th>Imagem</th>
        <th>Produto</th>
        <th>Preço Unitário</th>
        <th>QTd</th>
        <th>Total</th>
    </tr>
    <tr>
        <td><img src="imagens/motorola.png" class="motorola"></td>
        <td>Celular Motorola</td>
        <td>R$ 1000</td>
        <td><button onclick="diminuirmotorola()" class="dimi">-</button>
            <span id="motorolaq">0</span>
        <button onclick="somarmotorola()" class="add">+</button>
        </td>
        <td>R$ <span id="valormotorola">0</span></td>
    </tr>
    <tr>
        <td><img src="imagens/tv.png" class="tv"></td>
        <td>Televisão Samsung</td>
        <td>R$ 2500</td>
        <td><button onclick="diminuirtv()" class="dimi">-</button>
            <span id="tvq">0</span>
        <button onclick="somartv()" class="add">+</button>
    </td>
        <td>R$ <span id="valortv">0</span></td>
    </tr>
        <tr>
        <td><img src="imagens/note.png" class="note"></td>
        <td>Notebook Apple</td>
        <td>R$ 1500</td>
        <td><button onclick="diminuirnote()" class="dimi">-</button>
            <span id="noteq">0</span>
        <button onclick="somarnote()" class="add">+</button>
    </td>
        <td>R$ <span id="valornote">0</span></td>
    </tr>
   
    </table>
    <table class="tab">
        <tr>
            <td id="subb">Subtotal: R$ <span id="subtotal">0</span></td>
         </tr>
    </table>
    
</body>
</html>
